<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#ede9f6"/>
  <!-- Page with folded corner -->
  <g transform="translate(130, 50)">
    <path d="M0 20C0 9 9 0 20 0h80l40 40v160c0 11-9 20-20 20H20C9 220 0 211 0 200V20z" fill="white" stroke="#d4c8e8" stroke-width="2"/>
    <path d="M100 0v20c0 11 9 20 20 20h20" fill="#ede9f6" stroke="#d4c8e8" stroke-width="2"/>
    <!-- Text lines -->
    <rect x="24" y="60" width="70" height="6" rx="3" fill="#d4c8e8"/>
    <rect x="24" y="78" width="55" height="6" rx="3" fill="#d4c8e8" opacity="0.6"/>
    <rect x="24" y="96" width="65" height="6" rx="3" fill="#d4c8e8" opacity="0.4"/>
    <!-- 404 text -->
    <text x="70" y="165" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="36" font-weight="700" fill="#6366f1" opacity="0.5">404</text>
  </g>
  <!-- Magnifying glass -->
  <g transform="translate(255, 160)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#6366f1" stroke-width="4" opacity="0.6"/>
    <line x1="21" y1="21" x2="42" y2="42" stroke="#6366f1" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <!-- Question mark in glass -->
    <text x="0" y="8" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="28" font-weight="700" fill="#6366f1" opacity="0.5">?</text>
  </g>
  <!-- Decorative elements -->
  <circle cx="90" cy="80" r="5" fill="#6366f1" opacity="0.12"/>
  <circle cx="340" cy="100" r="4" fill="#d4c8e8"/>
  <circle cx="110" cy="250" r="6" fill="#6366f1" opacity="0.08"/>
</svg>
