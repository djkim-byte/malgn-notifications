<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#ede9f6"/>
  <!-- Monitor -->
  <g transform="translate(120, 40)">
    <rect x="0" y="0" width="160" height="110" rx="12" fill="white" stroke="#d4c8e8" stroke-width="2"/>
    <rect x="8" y="8" width="144" height="80" rx="6" fill="#f3f0f9"/>
    <!-- Warning icon on screen -->
    <g transform="translate(80, 48)">
      <path d="M0-18L18 14H-18z" fill="#f59e0b" opacity="0.8" stroke="#f59e0b" stroke-width="2" stroke-linejoin="round"/>
      <line x1="0" y1="-8" x2="0" y2="2" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="8" r="1.5" fill="white"/>
    </g>
    <!-- Monitor stand -->
    <rect x="60" y="110" width="40" height="8" rx="2" fill="#d4c8e8"/>
    <rect x="45" y="118" width="70" height="6" rx="3" fill="#d4c8e8" opacity="0.7"/>
  </g>
  <!-- Gear 1 -->
  <g transform="translate(80, 180)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.3"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.3"/>
    <!-- Gear teeth -->
    <rect x="-4" y="-26" width="8" height="8" rx="1" fill="#6366f1" opacity="0.3"/>
    <rect x="-4" y="18" width="8" height="8" rx="1" fill="#6366f1" opacity="0.3"/>
    <rect x="-26" y="-4" width="8" height="8" rx="1" fill="#6366f1" opacity="0.3"/>
    <rect x="18" y="-4" width="8" height="8" rx="1" fill="#6366f1" opacity="0.3"/>
  </g>
  <!-- Gear 2 -->
  <g transform="translate(320, 120)">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#6366f1" stroke-width="2.5" opacity="0.2"/>
    <circle cx="0" cy="0" r="7" fill="none" stroke="#6366f1" stroke-width="2.5" opacity="0.2"/>
    <rect x="-3" y="-19" width="6" height="6" rx="1" fill="#6366f1" opacity="0.2"/>
    <rect x="-3" y="13" width="6" height="6" rx="1" fill="#6366f1" opacity="0.2"/>
    <rect x="-19" y="-3" width="6" height="6" rx="1" fill="#6366f1" opacity="0.2"/>
    <rect x="13" y="-3" width="6" height="6" rx="1" fill="#6366f1" opacity="0.2"/>
  </g>
  <!-- Decorative -->
  <circle cx="340" cy="240" r="5" fill="#d4c8e8"/>
  <circle cx="60" cy="100" r="4" fill="#6366f1" opacity="0.1"/>
</svg>
