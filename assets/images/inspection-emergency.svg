<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#ede9f6"/>
  <!-- Shield -->
  <g transform="translate(200, 130)">
    <path d="M0-70c30 0 55 10 70 20v60c0 45-30 75-70 90-40-15-70-45-70-90v-60c15-10 40-20 70-20z" fill="white" stroke="#d4c8e8" stroke-width="2"/>
    <path d="M0-50c22 0 40 7 52 15v45c0 34-22 56-52 67-30-11-52-33-52-67v-45c12-8 30-15 52-15z" fill="#f3f0f9"/>
    <!-- Wrench icon in shield -->
    <g transform="translate(0, 10)">
      <path d="M-12-24c-8 8-8 20 0 28l20 20 8-8-20-20c-2-2-2-6 0-8 2-2 6-2 8 0l20 20 8-8-20-20c-8-8-20-8-28 0z" fill="#6366f1" opacity="0.5" transform="rotate(-15)"/>
      <line x1="-8" y1="16" x2="16" y2="-8" stroke="#6366f1" stroke-width="5" stroke-linecap="round" opacity="0.4"/>
    </g>
    <!-- Warning flash -->
    <g transform="translate(0, -5)">
      <polygon points="-6,-22 4,-4 -2,-4 6,18 -4,0 2,0" fill="#f59e0b" opacity="0.7"/>
    </g>
  </g>
  <!-- Alert circles -->
  <g transform="translate(310, 70)">
    <circle cx="0" cy="0" r="12" fill="#e05252" opacity="0.12"/>
    <text x="0" y="5" text-anchor="middle" font-family="Noto Sans KR, sans-serif" font-size="16" font-weight="700" fill="#e05252" opacity="0.5">!</text>
  </g>
  <!-- Decorative -->
  <circle cx="80" cy="80" r="6" fill="#6366f1" opacity="0.1"/>
  <circle cx="100" cy="240" r="4" fill="#d4c8e8"/>
  <circle cx="330" cy="230" r="5" fill="#6366f1" opacity="0.08"/>
</svg>
