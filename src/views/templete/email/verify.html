<div class="email-template">
    <div class="email-container">

        <!-- 로고 -->
        <div class="email-logo-box">로고</div>

        <!-- 제목 -->
        <h1 class="email-title">이메일 인증</h1>
        <hr class="email-divider">

        <!-- 본문 -->
        <div class="email-body">
            <h2 class="email-greeting">안녕하세요. 맑은 메시지 입니다.</h2>
            <p class="email-lead">회원가입을 위한 이메일 인증 번호를 보내드립니다.</p>

            <!-- 인증코드 -->
            <div class="email-otp-row">
                <div v-for="(d, i) in code.split('')" :key="i" class="email-otp-box">{{ d }}</div>
            </div>
            <p class="email-otp-note">위 인증코드가 이메일로 발송되었습니다.</p>

            <!-- 유효시간 안내 -->
            <div class="email-info-banner">
                <i class="bi bi-info-circle email-info-icon"></i>
                <div>
                    <div>인증코드는 발송 후 <strong>10분간 유효합니다.</strong></div>
                    <div>시간이 초과된 경우 비밀번호 찾기 페이지에서 인증코드를 다시 요청해 주세요.</div>
                </div>
            </div>
        </div>

        <!-- 안내 문구 -->
        <p class="email-disclaimer">본 메일은 발신 전용 메일이므로 회신 메일에 응답할 수 없습니다.</p>

        <!-- 푸터 -->
        <div class="email-footer">&copy; Malgnsoft. All rights reserved.</div>
    </div>
</div>
