<div class="auth-page">
    <div class="auth-container">

        <div class="auth-icon">
            <i class="bi bi-info-lg"></i>
        </div>

        <h1 class="auth-title">비밀번호 재설정하기</h1>
        <p class="auth-desc">
            가입하신 이메일 주소를 입력하시면,<br>
            비밀번호를 재설정할 수 있는 이메일 인증을 보내드립니다.
        </p>

        <form class="auth-form" @submit.prevent="sendResetMail" novalidate>
            <div class="auth-form-row">
                <label class="auth-form-label">이메일 주소</label>
                <input type="email"
                    class="auth-input"
                    :class="{ 'is-error': errors.email }"
                    placeholder="아이디로 등록된 이메일을 입력해 주세요"
                    v-model="form.email"
                    autocomplete="username">
                <div v-if="errors.email" class="auth-error-text">이메일 주소를 입력해 주세요</div>
            </div>

            <label class="auth-checkbox">
                <input type="checkbox" v-model="form.remember">
                <span>아이디 기억하기</span>
            </label>

            <button type="submit" class="auth-btn auth-btn-primary auth-btn-block">인증 메일 발송하기</button>

            <div class="auth-link-row auth-link-row-back">
                <a href="#/login" class="auth-link-back" @click.prevent="navigateTo('/login')">
                    <i class="bi bi-arrow-left"></i> 로그인 화면으로 돌아가기
                </a>
            </div>
        </form>
    </div>

    <!-- 발송 완료 모달 -->
    <div class="modal fade" tabindex="-1" ref="sentModal">
        <div class="modal-dialog modal-dialog-centered auth-modal-w400">
            <div class="modal-content auth-modal">
                <div class="auth-modal-body-confirm">
                    <div class="auth-modal-icon-info">
                        <i class="bi bi-envelope-check-fill"></i>
                    </div>
                    <p class="auth-modal-confirm-text">
                        입력하신 이메일로 비밀번호 재설정 메일을 발송했습니다.<br>
                        30분 이내에 메일을 확인해 주세요.
                    </p>
                </div>
                <div class="auth-modal-actions-single">
                    <button type="button" class="auth-btn auth-btn-primary auth-btn-block" @click="onSentConfirm">확인</button>
                </div>
            </div>
        </div>
    </div>
</div>
