<div class="container py-5 pagelists">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-3 mb-4">
        <div>
            <h3 class="fw-bold mb-1">맑은 NOTIFICATIONS - 페이지 목록</h3>
            <p class="text-muted mb-0">총 {{ totalPages }}개 페이지</p>
        </div>
        <div class="pagelists-total-badge">
            <span class="pagelists-total-num">{{ totalPages }}</span>
            <span class="pagelists-total-label">Total</span>
        </div>
    </div>

    <div v-for="group in groupedPages" :key="group.category" class="mb-4">
        <h6 class="fw-bold mb-2">
            {{ group.category }}
            <span class="badge bg-secondary ms-1">{{ group.pages.length }}</span>
        </h6>
        <div class="table-responsive">
            <table class="table table-bordered align-middle mb-0 pagelists-table">
                <thead class="table-light">
                    <tr>
                        <th class="pl-col-cat">구분</th>
                        <th class="pl-col-title">제목</th>
                        <th class="pl-col-url">URL</th>
                        <th class="pl-col-desc">설명</th>
                        <th class="pl-col-design">디자인</th>
                        <th class="pl-col-pub">퍼블리싱</th>
                        <th class="pl-col-mgmt">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="page in group.pages" :key="getStatusKey(page)">
                        <td>{{ getSubcategory(page) }}</td>
                        <td>{{ page.title }}</td>
                        <td>
                            <a
                                v-if="page.url"
                                :href="getFullUrl(page.url)"
                                target="_blank"
                                rel="noopener"
                                class="pagelists-url-link"
                            >{{ getFullUrl(page.url) }}</a>
                            <span v-else class="text-muted">추후 생성</span>
                        </td>
                        <td class="text-muted small">{{ page.description }}</td>
                        <td class="text-center">
                            <input
                                type="checkbox"
                                class="form-check-input"
                                :checked="getStatus(page).design"
                                :disabled="getStatus(page).saved"
                                @change="getStatus(page).design = $event.target.checked"
                            >
                        </td>
                        <td>
                            <input
                                type="text"
                                class="form-control form-control-sm"
                                placeholder="퍼블리싱 메모"
                                :value="getStatus(page).publishing"
                                :disabled="getStatus(page).saved"
                                @input="getStatus(page).publishing = $event.target.value"
                            >
                        </td>
                        <td class="text-center">
                            <button
                                v-if="!getStatus(page).saved"
                                type="button"
                                class="btn btn-primary btn-sm"
                                @click="saveStatus(page)"
                            >저장</button>
                            <button
                                v-else
                                type="button"
                                class="btn btn-outline-secondary btn-sm"
                                @click="editStatus(page)"
                            >수정</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
