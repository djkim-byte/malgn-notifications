<div class="auth-page">
    <div class="auth-container">

        <!-- 아이콘 플레이스홀더 -->
        <div class="auth-icon">
            <i class="bi bi-info-lg"></i>
        </div>

        <h1 class="auth-title">로그인</h1>

        <form class="auth-form" @submit.prevent="handleLogin" novalidate>
            <!-- 아이디 -->
            <div class="auth-form-row">
                <label class="auth-form-label">아이디</label>
                <input type="email"
                    class="auth-input"
                    :class="{ 'is-error': errors.email }"
                    placeholder="이메일을 입력해 주세요"
                    v-model="form.email"
                    autocomplete="username">
                <div v-if="errors.email" class="auth-error-text">아이디를 입력해 주세요</div>
            </div>

            <!-- 비밀번호 -->
            <div class="auth-form-row">
                <label class="auth-form-label">비밀번호</label>
                <div class="auth-input-with-icon">
                    <input :type="showPassword ? 'text' : 'password'"
                        class="auth-input auth-input-icon-right"
                        :class="{ 'is-error': errors.password }"
                        placeholder="비밀번호(영문, 숫자, 특수문자 조합으로 8자 이상) 를 입력해 주세요"
                        v-model="form.password"
                        autocomplete="current-password">
                    <button type="button" class="auth-input-toggle" @click="showPassword = !showPassword" tabindex="-1">
                        <i class="bi" :class="showPassword ? 'bi-eye' : 'bi-eye-slash'"></i>
                    </button>
                </div>
                <div v-if="errors.password" class="auth-error-text">비밀번호를 입력해 주세요</div>
            </div>

            <!-- 아이디 기억하기 -->
            <label class="auth-checkbox">
                <input type="checkbox" v-model="form.remember">
                <span>아이디 기억하기</span>
            </label>

            <!-- 로그인 버튼 -->
            <button type="submit" class="auth-btn auth-btn-primary auth-btn-block">
                <span class="auth-btn-icon"><i class="bi bi-info-lg"></i></span>
                <span>로그인 하기</span>
            </button>

            <!-- 비밀번호 재설정 링크 -->
            <div class="auth-link-row">
                <span class="auth-link-text">비밀번호가 생각나지 않으신다면</span>
                <a href="#/reset-password" class="auth-link-bold" @click.prevent="navigateTo('/reset-password')">비밀번호 재설정</a>
            </div>
        </form>

        <!-- 회원가입 박스 -->
        <a href="#/signup" class="auth-signup-box" @click.prevent="navigateTo('/signup')">
            <span class="auth-signup-icon"><i class="bi bi-info-lg"></i></span>
            <span class="auth-signup-text">
                <span class="auth-signup-text-sub">아직 회원가입을 하지 않으셨다면</span>
                <span class="auth-signup-text-main">회원가입하기</span>
            </span>
        </a>
    </div>
</div>
