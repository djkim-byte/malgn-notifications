<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" font-family="-apple-system, 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="960" height="540" fill="#f0fdfa"/>

  <!-- 상단 히어로 -->
  <rect x="0" y="0" width="960" height="160" fill="url(#heroGrad)"/>
  <circle cx="120" cy="90" r="180" fill="#0e7490" opacity="0.4"/>
  <circle cx="840" cy="40" r="120" fill="#0891b2" opacity="0.3"/>

  <text x="40" y="62" font-weight="800" font-size="32" fill="#fff">2025 Year in Review</text>
  <text x="40" y="92" font-size="14" fill="#a5f3fc">맑은 메시징과 함께한 한 해의 기록</text>

  <!-- 로고 우상단 -->
  <rect x="840" y="34" width="80" height="32" rx="8" fill="#fff" opacity="0.15"/>
  <text x="880" y="55" font-weight="700" font-size="12" fill="#fff" text-anchor="middle">맑은 메시징</text>

  <!-- 큰 숫자 카드 4개 (히어로에 살짝 겹쳐) -->
  <g transform="translate(40, 130)">
    <rect width="200" height="120" rx="14" fill="url(#cardGlow)" stroke="#cffafe"/>
    <text x="20" y="32" font-size="11" fill="#0e7490">올해 누적 발송량</text>
    <text x="20" y="68" font-weight="800" font-size="30" fill="#0f172a">2.4억</text>
    <text x="100" y="68" font-size="12" fill="#475569"> 건</text>
    <rect x="20" y="86" width="56" height="20" rx="10" fill="#d1fae5"/>
    <text x="48" y="100" font-weight="700" font-size="10" fill="#065f46" text-anchor="middle">+38%</text>
    <text x="84" y="100" font-size="9" fill="#94a3b8">전년 대비</text>
  </g>

  <g transform="translate(260, 130)">
    <rect width="200" height="120" rx="14" fill="url(#cardGlow)" stroke="#cffafe"/>
    <text x="20" y="32" font-size="11" fill="#0e7490">평균 도달률</text>
    <text x="20" y="68" font-weight="800" font-size="30" fill="#0f172a">99.4%</text>
    <text x="20" y="92" font-size="10" fill="#64748b">업계 평균 대비 +1.8%p</text>
    <rect x="20" y="100" width="160" height="6" rx="3" fill="#cffafe"/>
    <rect x="20" y="100" width="159" height="6" rx="3" fill="#0891b2"/>
  </g>

  <g transform="translate(480, 130)">
    <rect width="200" height="120" rx="14" fill="url(#cardGlow)" stroke="#cffafe"/>
    <text x="20" y="32" font-size="11" fill="#0e7490">평균 발송 지연</text>
    <text x="20" y="68" font-weight="800" font-size="30" fill="#0f172a">0.8</text>
    <text x="62" y="68" font-size="12" fill="#475569"> 초</text>
    <text x="20" y="92" font-size="10" fill="#64748b">전 채널 평균</text>
    <text x="20" y="108" font-size="10" fill="#10b981">↓ 0.4초 단축</text>
  </g>

  <g transform="translate(700, 130)">
    <rect width="220" height="120" rx="14" fill="url(#cardGlow)" stroke="#cffafe"/>
    <text x="20" y="32" font-size="11" fill="#0e7490">단일 캠페인 최대 처리</text>
    <text x="20" y="68" font-weight="800" font-size="26" fill="#0f172a">920만</text>
    <text x="106" y="68" font-size="12" fill="#475569"> 건</text>
    <text x="20" y="92" font-size="10" fill="#64748b">2025.11.11 · 안정 운영</text>
    <rect x="20" y="100" width="80" height="20" rx="10" fill="#fef3c7"/>
    <text x="60" y="114" font-weight="700" font-size="10" fill="#854d0e" text-anchor="middle">★ 신기록</text>
  </g>

  <!-- 월간 발송량 차트 -->
  <g transform="translate(40, 274)">
    <rect width="540" height="244" rx="14" fill="#fff" stroke="#e0f2fe"/>
    <text x="24" y="32" font-weight="700" font-size="14" fill="#0f172a">월간 발송량 추이</text>
    <text x="24" y="50" font-size="11" fill="#64748b">2025년 1월 ~ 12월 (단위: 백만건)</text>

    <!-- 격자 -->
    <line x1="60" y1="80" x2="520" y2="80" stroke="#f1f5f9"/>
    <line x1="60" y1="120" x2="520" y2="120" stroke="#f1f5f9"/>
    <line x1="60" y1="160" x2="520" y2="160" stroke="#f1f5f9"/>
    <line x1="60" y1="200" x2="520" y2="200" stroke="#f1f5f9"/>

    <text x="54" y="84" font-size="9" fill="#94a3b8" text-anchor="end">30</text>
    <text x="54" y="124" font-size="9" fill="#94a3b8" text-anchor="end">20</text>
    <text x="54" y="164" font-size="9" fill="#94a3b8" text-anchor="end">10</text>
    <text x="54" y="204" font-size="9" fill="#94a3b8" text-anchor="end">0</text>

    <!-- 막대 (12개월) -->
    <g>
      <rect x="68" y="160" width="28" height="40" rx="4" fill="#67e8f9"/>
      <rect x="104" y="150" width="28" height="50" rx="4" fill="#67e8f9"/>
      <rect x="140" y="140" width="28" height="60" rx="4" fill="#67e8f9"/>
      <rect x="176" y="135" width="28" height="65" rx="4" fill="#22d3ee"/>
      <rect x="212" y="125" width="28" height="75" rx="4" fill="#22d3ee"/>
      <rect x="248" y="110" width="28" height="90" rx="4" fill="#22d3ee"/>
      <rect x="284" y="100" width="28" height="100" rx="4" fill="#0891b2"/>
      <rect x="320" y="92" width="28" height="108" rx="4" fill="#0891b2"/>
      <rect x="356" y="105" width="28" height="95" rx="4" fill="#0891b2"/>
      <rect x="392" y="86" width="28" height="114" rx="4" fill="#0e7490"/>
      <rect x="428" y="72" width="28" height="128" rx="4" fill="#0e7490"/>
      <rect x="464" y="80" width="28" height="120" rx="4" fill="#0e7490"/>
    </g>

    <!-- 11월 신기록 표시 -->
    <line x1="442" y1="58" x2="442" y2="72" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="2,2"/>
    <rect x="406" y="44" width="74" height="20" rx="10" fill="#ef4444"/>
    <text x="442" y="58" font-weight="700" font-size="10" fill="#fff" text-anchor="middle">★ 신기록 920만</text>

    <!-- X축 라벨 -->
    <text x="82" y="218" font-size="9" fill="#94a3b8" text-anchor="middle">1월</text>
    <text x="154" y="218" font-size="9" fill="#94a3b8" text-anchor="middle">3월</text>
    <text x="226" y="218" font-size="9" fill="#94a3b8" text-anchor="middle">5월</text>
    <text x="298" y="218" font-size="9" fill="#94a3b8" text-anchor="middle">7월</text>
    <text x="370" y="218" font-size="9" fill="#94a3b8" text-anchor="middle">9월</text>
    <text x="442" y="218" font-size="9" fill="#94a3b8" text-anchor="middle">11월</text>
  </g>

  <!-- 채널 분포 (원 차트 + 범례) -->
  <g transform="translate(600, 274)">
    <rect width="320" height="244" rx="14" fill="#fff" stroke="#e0f2fe"/>
    <text x="20" y="32" font-weight="700" font-size="14" fill="#0f172a">채널별 비중</text>
    <text x="20" y="50" font-size="11" fill="#64748b">2025년 누적</text>

    <!-- 도넛 차트 -->
    <g transform="translate(80, 140)">
      <!-- SMS 50% -->
      <path d="M 0 -60 A 60 60 0 0 1 60 0 L 36 0 A 36 36 0 0 0 0 -36 Z" fill="#0891b2"/>
      <!-- 알림톡 25% -->
      <path d="M 60 0 A 60 60 0 0 1 0 60 L 0 36 A 36 36 0 0 0 36 0 Z" fill="#22d3ee"/>
      <!-- 이메일 15% -->
      <path d="M 0 60 A 60 60 0 0 1 -52 30 L -31 18 A 36 36 0 0 0 0 36 Z" fill="#67e8f9"/>
      <!-- RCS 7% -->
      <path d="M -52 30 A 60 60 0 0 1 -58 -15 L -35 -9 A 36 36 0 0 0 -31 18 Z" fill="#a5f3fc"/>
      <!-- PUSH 3% -->
      <path d="M -58 -15 A 60 60 0 0 1 0 -60 L 0 -36 A 36 36 0 0 0 -35 -9 Z" fill="#cffafe"/>
      <text x="0" y="-2" font-weight="800" font-size="20" fill="#0f172a" text-anchor="middle">2.4억</text>
      <text x="0" y="14" font-size="9" fill="#64748b" text-anchor="middle">총 발송</text>
    </g>

    <!-- 범례 -->
    <g transform="translate(170, 86)">
      <rect x="0" y="0" width="10" height="10" rx="2" fill="#0891b2"/>
      <text x="16" y="9" font-size="11" fill="#0f172a">SMS</text>
      <text x="140" y="9" font-weight="700" font-size="11" fill="#0f172a" text-anchor="end">50%</text>

      <rect x="0" y="22" width="10" height="10" rx="2" fill="#22d3ee"/>
      <text x="16" y="31" font-size="11" fill="#0f172a">알림톡</text>
      <text x="140" y="31" font-weight="700" font-size="11" fill="#0f172a" text-anchor="end">25%</text>

      <rect x="0" y="44" width="10" height="10" rx="2" fill="#67e8f9"/>
      <text x="16" y="53" font-size="11" fill="#0f172a">이메일</text>
      <text x="140" y="53" font-weight="700" font-size="11" fill="#0f172a" text-anchor="end">15%</text>

      <rect x="0" y="66" width="10" height="10" rx="2" fill="#a5f3fc"/>
      <text x="16" y="75" font-size="11" fill="#0f172a">RCS</text>
      <text x="140" y="75" font-weight="700" font-size="11" fill="#0f172a" text-anchor="end">7%</text>

      <rect x="0" y="88" width="10" height="10" rx="2" fill="#cffafe"/>
      <text x="16" y="97" font-size="11" fill="#0f172a">PUSH</text>
      <text x="140" y="97" font-weight="700" font-size="11" fill="#0f172a" text-anchor="end">3%</text>
    </g>

    <line x1="20" y1="206" x2="300" y2="206" stroke="#e0f2fe"/>
    <text x="20" y="226" font-size="10" fill="#64748b">전년 대비 알림톡 비중 +6%p 증가</text>
  </g>
</svg>
